<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Soccer Superstar icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1f3a"/>
      <stop offset="100%" stop-color="#050b14"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- crown body -->
  <path d="M5 24 L5 14 L10 19 L16 7 L22 19 L27 14 L27 24 Z" fill="#d6ff33"/>
  <!-- crown base band -->
