  <!-- crown tip dots -->
  <circle cx="16" cy="7"  r="2.2" fill="#ffffff"/>
  <circle cx="5"  cy="14" r="1.8" fill="#ffffff"/>
  <circle cx="27" cy="14" r="1.8" fill="#ffffff"/>
  <!-- football at base -->
  <circle cx="16" cy="29" r="3" fill="none" stroke="#64c9ff" stroke-width="1.2"/>
  <polygon points="16,25.5 17.1,26.4 16.7,27.7 15.3,27.7 14.9,26.4" fill="#64c9ff"/>
